<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI HTTP Bin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #F6F7F9;
    --surface:   #FFFFFF;
    --surface2:  #F1F2F4;
    --surface3:  #E8E9EC;
    --border:    #E2E4E8;
    --border2:   #CDD0D6;
    --text:      #18181B;
    --text-dim:  #6B7280;
    --text-muted:#9CA3AF;
    --green:     #16A34A;
    --green-dim: #F0FDF4;
    --amber:     #D97706;
    --amber-dim: #FFFBEB;
    --red:       #DC2626;
    --red-dim:   #FEF2F2;
    --blue:      #2563EB;
    --blue-dim:  #EFF6FF;
    --purple:    #7C3AED;
    --purple-dim:#F5F3FF;
    --cyan:      #0891B2;
    --sel:       #EFF6FF;
    --sel-border:#2563EB;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    line-height: 1.5;
    overflow: hidden;
  }

  /* ── LAYOUT ─────────────────────────────────────────── */
  .app {
    display: grid;
    grid-template-rows: 48px 1fr 44px;
    height: 100vh;
  }

  /* ── HEADER ─────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    user-select: none;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text);
  }

  .logo-icon {
    width: 22px;
    height: 22px;
    background: var(--green-dim);
    border: 1px solid var(--green);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--green);
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 20px;
    color: var(--text-dim);
    font-size: 11px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 500;
    transition: color 0.3s;
  }

  .live-badge.connected { color: var(--green); }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: background 0.3s;
  }

  .live-badge.connected .live-dot {
    background: var(--green);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.35); }
    50%       { opacity: 0.7; box-shadow: 0 0 0 4px rgba(22, 163, 74, 0); }
  }

  @keyframes flash {
    0%   { background: rgba(37, 99, 235, 0.09); }
    100% { background: transparent; }
  }

  /* ── MAIN ────────────────────────────────────────────── */
  main {
    display: grid;
    grid-template-columns: 280px 1fr;
    overflow: hidden;
  }

  /* ── PANEL HEADER ────────────────────────────────────── */
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    height: 34px;
    min-height: 34px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    user-select: none;
    flex-shrink: 0;
  }

  .panel-header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── MASTER PANEL ────────────────────────────────────── */
  .master-panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
    background: var(--bg);
  }

  .master-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .master-body::-webkit-scrollbar { width: 4px; }
  .master-body::-webkit-scrollbar-track { background: transparent; }
  .master-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── DETAIL COLUMN ───────────────────────────────────── */
  .detail-col {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface);
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── BUTTONS ─────────────────────────────────────────── */
  .btn-icon {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    border-radius: 3px;
    width: 20px;
    height: 20px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.1s, border-color 0.1s;
    flex-shrink: 0;
  }

  .btn-icon:hover {
    color: var(--text);
    border-color: var(--text-dim);
  }

  .btn-sm {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    border-radius: 3px;
    padding: 1px 7px;
    height: 20px;
    cursor: pointer;
    font-family: inherit;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.1s, border-color 0.1s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .btn-sm:hover {
    color: var(--text);
    border-color: var(--text-dim);
  }

  .btn-sm.danger:hover {
    color: var(--red);
    border-color: var(--red);
  }

  /* ── TOKEN GROUP (expandable) ────────────────────────── */
  .token-group {
    border-bottom: 1px solid var(--border);
  }

  .tg-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
    background: var(--surface);
  }

  .tg-header:hover { background: var(--surface2); }

  .tg-header.active {
    background: var(--sel);
    border-left: 2px solid var(--blue);
    padding-left: 10px;
  }

  .tg-arrow {
    font-size: 9px;
    color: var(--text-muted);
    width: 10px;
    flex-shrink: 0;
  }

  .tg-main {
    flex: 1;
    min-width: 0;
  }

  .tg-id {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.03em;
  }

  .tg-header.active .tg-id { color: var(--blue); }

  .tg-meta {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 2px;
    font-size: 10px;
    color: var(--text-dim);
    flex-wrap: wrap;
  }

  .tg-del-btn {
    display: none;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 2px;
    flex-shrink: 0;
    font-family: inherit;
  }

  .tg-header:hover .tg-del-btn { display: flex; }

  .tg-del-btn:hover {
    color: var(--red);
    background: var(--red-dim);
  }

  /* ── COLLAPSIBLE REQUEST LIST ────────────────────────── */
  .tg-requests {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.2s ease;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }

  .token-group.expanded .tg-requests {
    max-height: 2000px;
  }

  /* ── NESTED REQUEST ROWS ─────────────────────────────── */
  .nr-row {
    display: grid;
    grid-template-columns: 56px 48px 1fr auto;
    align-items: center;
    padding: 6px 12px 6px 24px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    font-size: 11px;
  }

  .nr-row:last-child { border-bottom: none; }
  .nr-row:hover { background: var(--surface2); }

  .nr-row.active {
    background: var(--sel);
    border-left: 2px solid var(--blue);
    padding-left: 22px;
  }

  .nr-row.new-flash { animation: flash 0.6s ease; }

  .nr-time {
    font-size: 10px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  .nr-path {
    padding: 0 6px;
    font-size: 11px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .nr-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--blue);
    flex-shrink: 0;
    margin-left: 4px;
  }

  /* ── TAGS ────────────────────────────────────────────── */
  .tag {
    padding: 1px 5px;
    border-radius: 2px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .tag-agent  { background: var(--blue-dim);   color: var(--blue); }
  .tag-script { background: var(--purple-dim); color: var(--purple); }
  .tag-anon   { background: var(--surface3);   color: var(--text-dim); }

  .ttl-label {
    font-size: 9px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .ttl-label.expiring-soon { color: var(--amber); }

  .token-count-chip {
    font-size: 10px;
    color: var(--text-dim);
  }

  .divider {
    width: 1px;
    height: 16px;
    background: var(--border2);
  }

  /* ── METHOD BADGES ───────────────────────────────────── */
  .method-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 1px 4px;
    border-radius: 2px;
    text-align: center;
  }

  .method-GET    { color: var(--blue);   background: var(--blue-dim); }
  .method-POST   { color: var(--green);  background: var(--green-dim); }
  .method-PUT    { color: var(--amber);  background: var(--amber-dim); }
  .method-PATCH  { color: var(--amber);  background: var(--amber-dim); }
  .method-DELETE { color: var(--red);    background: var(--red-dim); }

  /* ── DETAIL EMPTY ────────────────────────────────────── */
  .detail-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 11px;
    gap: 8px;
    user-select: none;
    padding: 40px 20px;
    text-align: center;
  }

  .detail-empty-icon {
    font-size: 28px;
    opacity: 0.3;
  }

  /* ── DETAIL SECTIONS ─────────────────────────────────── */
  .detail-section { border-bottom: 1px solid var(--border); }

  .detail-section-head {
    padding: 6px 14px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: var(--surface);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
  }

  .detail-section-head:hover { color: var(--text); }

  .detail-section-body { padding: 10px 14px; }

  .detail-hero {
    padding: 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .detail-method-path {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .detail-method {
    font-size: 13px;
    font-weight: 600;
  }

  .detail-path {
    font-size: 13px;
    color: var(--text);
    word-break: break-all;
  }

  .detail-meta-row {
    display: flex;
    gap: 16px;
    margin-top: 6px;
    font-size: 10px;
    color: var(--text-dim);
    flex-wrap: wrap;
  }

  /* ── KV TABLE ────────────────────────────────────────── */
  .kv-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
  }

  .kv-table tr { border-bottom: 1px solid var(--border); }
  .kv-table tr:last-child { border-bottom: none; }

  .kv-table td {
    padding: 4px 0;
    vertical-align: top;
  }

  .kv-key {
    color: var(--text-dim);
    padding-right: 12px;
    white-space: nowrap;
    font-size: 10px;
    min-width: 120px;
    max-width: 140px;
    word-break: break-all;
  }

  .kv-val {
    color: var(--text);
    word-break: break-all;
    font-size: 10px;
  }

  /* ── CODE BLOCK ──────────────────────────────────────── */
  .code-block {
    background: var(--surface3);
    border: 1px solid var(--border2);
    border-radius: 3px;
    padding: 10px;
    font-size: 10.5px;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-all;
    overflow: auto;
    max-height: 220px;
    line-height: 1.7;
  }

  .code-block::-webkit-scrollbar { width: 4px; height: 4px; }
  .code-block::-webkit-scrollbar-track { background: transparent; }
  .code-block::-webkit-scrollbar-thumb { background: var(--border2); }

  /* ── SYNTAX HIGHLIGHT ────────────────────────────────── */
  .jk      { color: var(--cyan); }
  .jv-str  { color: var(--green); }
  .jv-num  { color: var(--amber); }
  .jv-bool { color: var(--purple); }
  .jv-null { color: var(--text-dim); }

  /* ── FOOTER ──────────────────────────────────────────── */
  footer {
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 6px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    overflow-x: auto;
    overflow-y: hidden;
    user-select: none;
    font-size: 10px;
  }

  footer::-webkit-scrollbar { display: none; }

  .footer-label {
    color: var(--text-dim);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    white-space: nowrap;
    padding-right: 4px;
    border-right: 1px solid var(--border2);
    margin-right: 4px;
  }

  .var-chip {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--surface3);
    border: 1px solid var(--border2);
    border-radius: 3px;
    padding: 2px 0;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .var-key {
    padding: 0 6px;
    color: var(--text-dim);
    border-right: 1px solid var(--border2);
    font-size: 10px;
  }

  .var-val {
    padding: 0 7px;
    color: var(--green);
    font-size: 10px;
  }

  .empty-vars {
    color: var(--text-muted);
    font-size: 10px;
  }

  /* ── TOAST ───────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 56px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--text);
    border: 1px solid var(--text);
    color: var(--surface);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 6px 14px;
    border-radius: 3px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon">⬡</div>
      AI HTTP BIN
    </div>
    <div class="header-meta">
      <span id="token-summary">loading…</span>
      <div class="divider"></div>
      <div class="live-badge" id="conn-badge">
        <div class="live-dot"></div>
        <span id="conn-label">CONNECTING</span>
      </div>
    </div>
  </header>

  <main>
    <!-- LEFT: master panel -->
    <div class="master-panel">
      <div class="panel-header">
        Tokens <span class="token-count-chip" id="token-count">0</span>
        <div class="panel-header-right">
          <button class="btn-icon" id="create-token-btn" title="New token">+</button>
        </div>
      </div>
      <div class="master-body" id="master-body">
        <div class="detail-empty">
          <div class="detail-empty-icon">◈</div>
          <span>loading…</span>
        </div>
      </div>
    </div>

    <!-- RIGHT: detail panel -->
    <div class="detail-col">
      <div class="panel-header" id="detail-header">
        Request Detail
      </div>
      <div class="panel-body" id="detail-body">
        <div class="detail-empty">
          <div class="detail-empty-icon">◉</div>
          <span>select a request to inspect</span>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <span class="footer-label">Global Vars</span>
    <div id="vars-strip"><span class="empty-vars">no global vars</span></div>
  </footer>

</div>

<!-- hidden elements for JS compatibility -->
<span id="feed-title" style="display:none"></span>
<div id="live-indicator" style="display:none"></div>
<div id="url-bar" style="display:none"><span id="url-bar-text"></span></div>
<button id="copy-url-btn" style="display:none"></button>
<button id="clear-req-btn" style="display:none"></button>
<div id="toast" class="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────
var BASE   = window.location.origin;
var WS_URL = BASE.replace(/^http/, 'ws') + '/graphql';

// ── STATE ─────────────────────────────────────────────────────────
var tokens          = [];
var requestsMap     = {}; // tokenId -> [Request]
var globalVars      = [];
var selectedToken   = null;
var selectedRequest = null;
var expandedTokens  = {}; // tokenId -> bool

// ── WEBSOCKET ─────────────────────────────────────────────────────
var ws        = null;
var wsReady   = false;
var wsSubId   = null;
var wsRetryMs = 2000;

// ── HELPERS ───────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function shortId(id) {
  return id ? id.substring(0, 8) : '????????';
}

function formatTime(iso) {
  try {
    var d = new Date(iso);
    return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch(e) {
    return (iso || '').slice(11, 19) || '--:--:--';
  }
}

function methodClass(m) { return 'method-' + (m || 'GET'); }

function methodColor(m) {
  var map = { GET: 'var(--blue)', POST: 'var(--green)', PUT: 'var(--amber)', PATCH: 'var(--amber)', DELETE: 'var(--red)' };
  return map[m] || 'var(--text)';
}

function prettyJson(str) {
  if (!str || str === 'null') return null;
  try {
    var obj = JSON.parse(str);
    return syntaxHighlight(JSON.stringify(obj, null, 2));
  } catch(e) {
    return esc(str);
  }
}

function syntaxHighlight(json) {
  return json
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function(match) {
      var cls = 'jv-num';
      if (/^"/.test(match)) {
        cls = /:$/.test(match) ? 'jk' : 'jv-str';
      } else if (/true|false/.test(match)) {
        cls = 'jv-bool';
      } else if (/null/.test(match)) {
        cls = 'jv-null';
      }
      if (cls === 'jk') return '<span class="jk">' + esc(match) + '</span>';
      return '<span class="' + cls + '">' + esc(match) + '</span>';
    })
    .replace(/\n/g, '<br>')
    .replace(/ {2}/g, '&nbsp;&nbsp;');
}

function normalizeReq(r) {
  return {
    id:         r.id,
    token_id:   r.token_id  || r.tokenId  || '',
    method:     r.method    || 'GET',
    url:        r.url       || '',
    hostname:   r.hostname  || '',
    path:       r.path      || '/',
    headers:    r.headers   || '{}',
    query:      r.query     || '{}',
    body:       r.body      || '',
    form_data:  r.form_data || r.formData || 'null',
    ip:         r.ip        || '',
    user_agent: r.user_agent || r.userAgent || '',
    created_at: r.created_at || r.createdAt || ''
  };
}

function ttlLabel(expiresAt) {
  if (!expiresAt) return null;
  var ms = new Date(expiresAt) - Date.now();
  if (ms <= 0) return { label: 'expired', soon: true };
  var h = Math.floor(ms / 3600000);
  var m = Math.floor((ms % 3600000) / 60000);
  var label = h > 0 ? (h + 'h ' + m + 'm') : (m + 'm');
  return { label: label, soon: h < 2 };
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 1800);
}

// ── API ───────────────────────────────────────────────────────────
function apiFetch(method, path, body) {
  var opts = { method: method, headers: {} };
  if (body !== undefined && body !== null) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  return fetch(BASE + path, opts).then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    if (res.status === 204) return null;
    return res.json();
  });
}

// ── TOKEN API ─────────────────────────────────────────────────────
function loadTokens() {
  return apiFetch('GET', '/api/tokens').then(function(data) {
    tokens = data || [];
    updateTokenSummary();
    renderTokenList();
  }).catch(function(err) {
    console.error('loadTokens:', err);
  });
}

function createToken() {
  apiFetch('POST', '/api/tokens', {}).then(function(t) {
    tokens.unshift(t);
    expandedTokens[t.id] = true;
    updateTokenSummary();
    renderTokenList();
    selectToken(t);
  }).catch(function(err) {
    console.error('createToken:', err);
    showToast('failed to create token');
  });
}

function deleteToken(tokenId) {
  apiFetch('DELETE', '/api/tokens/' + tokenId).then(function() {
    tokens = tokens.filter(function(t) { return t.id !== tokenId; });
    delete expandedTokens[tokenId];
    if (selectedToken && selectedToken.id === tokenId) {
      selectedToken   = null;
      selectedRequest = null;
      wsUnsubscribe();
      renderDetailEmpty();
      document.getElementById('detail-header').textContent = 'Request Detail';
    }
    updateTokenSummary();
    renderTokenList();
  }).catch(function(err) {
    console.error('deleteToken:', err);
    showToast('failed to delete token');
  });
}

// ── REQUEST API ───────────────────────────────────────────────────
function loadRequests(token) {
  return apiFetch('GET', '/api/tokens/' + token.id + '/requests?per_page=200&sorting=newest').then(function(data) {
    var reqs = (data.data || []).map(normalizeReq);
    requestsMap[token.id] = reqs;
    var t = findToken(token.id);
    if (t) t.request_count = data.total || reqs.length;
    renderTokenList();
  }).catch(function(err) {
    console.error('loadRequests:', err);
  });
}

function clearRequests(token) {
  apiFetch('DELETE', '/api/tokens/' + token.id + '/requests').then(function() {
    requestsMap[token.id] = [];
    var t = findToken(token.id);
    if (t) t.request_count = 0;
    renderTokenList();
    if (selectedRequest && selectedRequest.token_id === token.id) {
      selectedRequest = null;
      renderDetailEmpty();
      document.getElementById('detail-header').textContent = 'Request Detail';
    }
  }).catch(function(err) {
    console.error('clearRequests:', err);
    showToast('failed to clear requests');
  });
}

// ── GLOBAL VARS API ───────────────────────────────────────────────
function loadGlobalVars() {
  apiFetch('GET', '/api/vars').then(function(data) {
    globalVars = data || [];
    renderVars();
  }).catch(function(err) {
    console.error('loadGlobalVars:', err);
  });
}

// ── HELPERS ───────────────────────────────────────────────────────
function findToken(id) {
  for (var i = 0; i < tokens.length; i++) {
    if (tokens[i].id === id) return tokens[i];
  }
  return null;
}

function updateTokenSummary() {
  var total = 0;
  for (var i = 0; i < tokens.length; i++) {
    total += tokens[i].request_count || 0;
  }
  document.getElementById('token-summary').textContent =
    tokens.length + ' token' + (tokens.length !== 1 ? 's' : '') +
    ' · ' + total + ' request' + (total !== 1 ? 's' : '');
  document.getElementById('token-count').textContent = tokens.length;
}

// ── RENDER: MASTER LIST ────────────────────────────────────────────
function renderTokenList() {
  var body = document.getElementById('master-body');
  body.innerHTML = '';

  if (tokens.length === 0) {
    body.innerHTML =
      '<div class="detail-empty">' +
      '<div class="detail-empty-icon">◈</div>' +
      '<span>no tokens — click + to create one</span>' +
      '</div>';
    return;
  }

  tokens.forEach(function(t) {
    body.appendChild(buildTokenGroup(t));
  });
}

function buildTokenGroup(t) {
  var isExpanded = !!expandedTokens[t.id];
  var isActive   = selectedToken && selectedToken.id === t.id;

  var group = document.createElement('div');
  group.className = 'token-group' + (isExpanded ? ' expanded' : '');
  group.setAttribute('data-id', t.id);

  // Build tag html
  var tagHtml = '';
  if (t.agent_id) {
    tagHtml += '<span class="tag tag-agent">' + esc(t.agent_id) + '</span>';
  } else {
    tagHtml += '<span class="tag tag-anon">anon</span>';
  }
  if (t.script) {
    tagHtml += '<span class="tag tag-script">script</span>';
  }

  var count = t.request_count || 0;
  var ttl   = ttlLabel(t.expires_at);
  var ttlHtml = ttl
    ? '<span class="ttl-label' + (ttl.soon ? ' expiring-soon' : '') + '">' + esc(ttl.label) + '</span>'
    : '';

  var arrow = isExpanded ? '▾' : '▸';

  // Header
  var header = document.createElement('div');
  header.className = 'tg-header' + (isActive ? ' active' : '');
  header.innerHTML =
    '<span class="tg-arrow">' + arrow + '</span>' +
    '<div class="tg-main">' +
      '<div class="tg-id">' + esc(shortId(t.id)) + '</div>' +
      '<div class="tg-meta">' +
        tagHtml +
        '<span>' + count + ' req' + (count !== 1 ? 's' : '') + '</span>' +
        ttlHtml +
      '</div>' +
    '</div>' +
    '<button class="tg-del-btn" title="Delete token">×</button>';

  header.addEventListener('click', function(e) {
    if (e.target.classList.contains('tg-del-btn')) return;
    // If clicking the already-selected token header, just toggle expand
    if (selectedToken && selectedToken.id === t.id) {
      toggleExpand(t);
    } else {
      selectToken(t);
    }
  });

  var delBtn = header.querySelector('.tg-del-btn');
  delBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    deleteToken(t.id);
  });

  group.appendChild(header);

  // Requests container
  var reqsEl = document.createElement('div');
  reqsEl.className = 'tg-requests';

  if (isExpanded) {
    var reqs = requestsMap[t.id];
    if (!reqs) {
      reqsEl.innerHTML =
        '<div class="detail-empty" style="padding:16px 20px">' +
        '<span>loading…</span>' +
        '</div>';
    } else if (reqs.length === 0) {
      reqsEl.innerHTML =
        '<div class="detail-empty" style="padding:16px 20px">' +
        '<span>no requests yet</span>' +
        '</div>';
    } else {
      reqs.forEach(function(r) {
        reqsEl.appendChild(buildNestedReqRow(r));
      });
    }
  }

  group.appendChild(reqsEl);
  return group;
}

function buildNestedReqRow(r) {
  var row = document.createElement('div');
  var isActive = selectedRequest && selectedRequest.id === r.id;
  row.className = 'nr-row' + (isActive ? ' active' : '');
  row.setAttribute('data-req-id', r.id);

  var displayPath = r.path || '/';

  row.innerHTML =
    '<span class="nr-time">' + esc(formatTime(r.created_at)) + '</span>' +
    '<span class="method-badge ' + methodClass(r.method) + '">' + esc(r.method) + '</span>' +
    '<span class="nr-path">' + esc(displayPath) + '</span>' +
    (isActive ? '<span class="nr-dot"></span>' : '<span></span>');

  row.addEventListener('click', function() {
    selectRequest(r);
  });

  return row;
}

// ── RENDER: DETAIL ────────────────────────────────────────────────
function renderDetail(r) {
  var body = document.getElementById('detail-body');
  body.innerHTML = '';

  document.getElementById('detail-header').textContent =
    (r.method || 'REQ') + ' ' + (r.path || '/');

  var hero = document.createElement('div');
  hero.className = 'detail-hero';
  hero.innerHTML =
    '<div class="detail-method-path">' +
      '<span class="detail-method" style="color:' + methodColor(r.method) + '">' + esc(r.method) + '</span>' +
      '<span class="detail-path">' + esc(r.path || '/') + '</span>' +
    '</div>' +
    '<div class="detail-meta-row">' +
      '<span>' + esc(formatTime(r.created_at)) + '</span>' +
      (r.ip ? '<span>' + esc(r.ip) + '</span>' : '') +
      (r.user_agent ? '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:240px">' + esc(r.user_agent) + '</span>' : '') +
    '</div>';
  body.appendChild(hero);

  var hdrs = parseJsonObj(r.headers);
  if (hdrs && Object.keys(hdrs).length > 0) {
    body.appendChild(buildSection('Headers', buildKV(hdrs)));
  }

  var qry = parseJsonObj(r.query);
  if (qry && Object.keys(qry).length > 0) {
    body.appendChild(buildSection('Query', buildKV(qry)));
  }

  var bodyHtml;
  if (r.body && r.body.trim()) {
    var pretty = prettyJson(r.body);
    bodyHtml = buildCodeBlock(pretty !== null ? pretty : esc(r.body));
  } else {
    bodyHtml = '<span style="color:var(--text-muted);font-size:10px;font-style:italic">empty</span>';
  }
  body.appendChild(buildSection('Body', bodyHtml));

  var formData = parseJsonObj(r.form_data);
  if (formData && Object.keys(formData).length > 0) {
    body.appendChild(buildSection('Form Data', buildKV(formData)));
  }
}

function renderDetailEmpty() {
  document.getElementById('detail-body').innerHTML =
    '<div class="detail-empty">' +
    '<div class="detail-empty-icon">◉</div>' +
    '<span>select a request to inspect</span>' +
    '</div>';
}

function renderTokenConfig(token) {
  var body = document.getElementById('detail-body');
  body.innerHTML = '';

  document.getElementById('detail-header').textContent = 'TOKEN ' + shortId(token.id);

  var hero = document.createElement('div');
  hero.className = 'detail-hero';
  hero.innerHTML =
    '<div class="detail-method-path">' +
      '<span class="detail-method" style="color:var(--text-dim)">TOKEN</span>' +
      '<span class="detail-path">' + esc(shortId(token.id)) + '</span>' +
    '</div>' +
    '<div class="detail-meta-row">' +
      '<span>status <span style="color:var(--green)">' + (token.default_status || 200) + '</span></span>' +
      '<span style="color:var(--text-dim)">' + esc(token.default_content_type || 'text/plain') + '</span>' +
    '</div>';
  body.appendChild(hero);

  var content = token.default_content || '';
  var contentHtml = content
    ? buildCodeBlock(prettyJson(content) || esc(content))
    : '<span style="color:var(--text-muted);font-size:10px;font-style:italic">empty</span>';
  body.appendChild(buildSection('Response Body', contentHtml));

  if (token.script) {
    body.appendChild(buildSection('Script', buildCodeBlock(esc(token.script))));
  }
}

function parseJsonObj(str) {
  if (!str || str === 'null' || str === '{}') return null;
  try { return JSON.parse(str); } catch(e) { return null; }
}

function buildSection(title, contentHtml) {
  var sec  = document.createElement('div');
  sec.className = 'detail-section';

  var head = document.createElement('div');
  head.className = 'detail-section-head';
  head.innerHTML = esc(title) + '<span style="font-size:9px;color:var(--text-muted)">▾</span>';

  var bdy  = document.createElement('div');
  bdy.className = 'detail-section-body';
  bdy.innerHTML = contentHtml;

  head.addEventListener('click', function() {
    bdy.style.display = bdy.style.display === 'none' ? '' : 'none';
  });

  sec.appendChild(head);
  sec.appendChild(bdy);
  return sec;
}

function buildKV(obj) {
  var rows = '';
  Object.keys(obj).forEach(function(k) {
    rows += '<tr><td class="kv-key">' + esc(k) + '</td><td class="kv-val">' + esc(obj[k]) + '</td></tr>';
  });
  return '<table class="kv-table"><tbody>' + rows + '</tbody></table>';
}

function buildCodeBlock(html) {
  return '<div class="code-block">' + html + '</div>';
}

// ── RENDER: GLOBAL VARS ────────────────────────────────────────────
function renderVars() {
  var strip = document.getElementById('vars-strip');
  strip.innerHTML = '';
  if (!globalVars || globalVars.length === 0) {
    strip.innerHTML = '<span class="empty-vars">no global vars</span>';
    return;
  }
  globalVars.forEach(function(v) {
    var chip = document.createElement('div');
    chip.className = 'var-chip';
    var val = v.value || '';
    chip.innerHTML =
      '<span class="var-key">' + esc(v.key) + '</span>' +
      '<span class="var-val">' + esc(val.length > 24 ? val.substring(0, 24) + '…' : val) + '</span>';
    strip.appendChild(chip);
  });
}

// ── ACTIONS ───────────────────────────────────────────────────────
function selectToken(token) {
  selectedToken   = token;
  selectedRequest = null;
  expandedTokens[token.id] = true;

  renderTokenConfig(token);

  if (requestsMap[token.id]) {
    renderTokenList();
  } else {
    renderTokenList();
    loadRequests(token);
  }

  wsSubscribe(token.id);
}

function toggleExpand(token) {
  var wasExpanded = !!expandedTokens[token.id];
  expandedTokens[token.id] = !wasExpanded;

  if (!wasExpanded && !requestsMap[token.id]) {
    loadRequests(token);
  } else {
    renderTokenList();
  }
}

function selectRequest(req) {
  selectedRequest = req;
  renderDetail(req);
  renderTokenList();
}

// ── WEBSOCKET ─────────────────────────────────────────────────────
function wsConnect() {
  if (ws) return;
  try {
    ws = new WebSocket(WS_URL, 'graphql-transport-ws');
  } catch(e) {
    console.error('WS connect error:', e);
    scheduleReconnect();
    return;
  }

  ws.addEventListener('open', function() {
    ws.send(JSON.stringify({ type: 'connection_init', payload: {} }));
  });

  ws.addEventListener('message', function(event) {
    var msg;
    try { msg = JSON.parse(event.data); } catch(e) { return; }
    wsHandleMessage(msg);
  });

  ws.addEventListener('close', function() {
    ws      = null;
    wsReady = false;
    wsSubId = null;
    setConnected(false);
    scheduleReconnect();
  });

  ws.addEventListener('error', function() {
    // close event will follow
  });
}

function wsHandleMessage(msg) {
  switch(msg.type) {
    case 'connection_ack':
      wsReady = true;
      setConnected(true);
      if (selectedToken) wsSubscribe(selectedToken.id);
      break;
    case 'ping':
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'pong' }));
      }
      break;
    case 'next':
      if (msg.payload && msg.payload.data && msg.payload.data.requestReceived) {
        wsHandleRequestReceived(msg.payload.data.requestReceived);
      }
      break;
    case 'error':
      console.error('WS subscription error:', msg.payload);
      break;
    case 'complete':
      break;
  }
}

function wsSubscribe(tokenId) {
  wsUnsubscribe();
  if (!ws || !wsReady || ws.readyState !== WebSocket.OPEN) return;

  wsSubId = 'sub-' + tokenId;
  ws.send(JSON.stringify({
    type: 'subscribe',
    id: wsSubId,
    payload: {
      query: 'subscription { requestReceived(tokenId: "' + tokenId + '") { request { id tokenId method url hostname path headers query body formData ip userAgent createdAt } total truncated } }'
    }
  }));
}

function wsUnsubscribe() {
  if (ws && wsSubId && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'complete', id: wsSubId }));
  }
  wsSubId = null;
}

function wsHandleRequestReceived(event) {
  var raw     = event.request;
  var req     = normalizeReq(raw);
  var tokenId = req.token_id;

  if (!requestsMap[tokenId]) requestsMap[tokenId] = [];
  requestsMap[tokenId].unshift(req);

  var t = findToken(tokenId);
  if (t) t.request_count = event.total;

  updateTokenSummary();
  renderTokenList();

  // Flash the newly inserted row if the token is expanded
  if (expandedTokens[tokenId]) {
    var newRow = document.querySelector('.nr-row[data-req-id="' + req.id + '"]');
    if (newRow) {
      newRow.classList.add('new-flash');
    }
  }
}

function setConnected(v) {
  var badge = document.getElementById('conn-badge');
  var label = document.getElementById('conn-label');
  if (v) {
    badge.classList.add('connected');
    label.textContent = 'CONNECTED';
  } else {
    badge.classList.remove('connected');
    label.textContent = 'DISCONNECTED';
  }
}

var reconnectTimer = null;
function scheduleReconnect() {
  if (reconnectTimer) return;
  reconnectTimer = setTimeout(function() {
    reconnectTimer = null;
    wsConnect();
  }, wsRetryMs);
}

// ── CLIPBOARD ─────────────────────────────────────────────────────
function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      showToast('URL copied');
    }).catch(function() {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showToast('URL copied');
}

// ── BUTTON WIRING ─────────────────────────────────────────────────
document.getElementById('create-token-btn').addEventListener('click', function() {
  createToken();
});

document.getElementById('copy-url-btn').addEventListener('click', function() {
  var url = document.getElementById('url-bar-text').textContent;
  if (url) copyToClipboard(url);
});

document.getElementById('clear-req-btn').addEventListener('click', function() {
  if (selectedToken) clearRequests(selectedToken);
});

// ── INIT ──────────────────────────────────────────────────────────
function init() {
  wsConnect();
  loadTokens().then(function() {
    if (tokens.length > 0) selectToken(tokens[0]);
  });
  loadGlobalVars();
  setInterval(loadGlobalVars, 5000);
}

init();
</script>
