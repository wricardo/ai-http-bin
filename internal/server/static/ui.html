<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI HTTP Bin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #070a0b;
    --surface:   #0c1113;
    --surface2:  #101618;
    --surface3:  #141c1f;
    --border:    #182024;
    --border2:   #1f2a2e;
    --text:      #b8c8cc;
    --text-dim:  #4a5e63;
    --text-muted:#2a3b3f;
    --green:     #2dc88a;
    --green-dim: #1a5c40;
    --amber:     #e8a020;
    --amber-dim: #5a3e0a;
    --red:       #e05858;
    --red-dim:   #4a1a1a;
    --blue:      #4a9ae0;
    --blue-dim:  #143050;
    --purple:    #9878e8;
    --cyan:      #30b8c8;
    --sel:       #0f2830;
    --sel-border:#1a5a6a;
    --header-h:  48px;
    --footer-h:  44px;
    --token-w:   220px;
    --detail-w:  380px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.5;
    overflow: hidden;
  }

  /* ── LAYOUT ─────────────────────────────────────────── */
  .app {
    display: grid;
    grid-template-rows: var(--header-h) 1fr var(--footer-h);
    height: 100vh;
  }

  /* ── HEADER ─────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    user-select: none;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text);
  }

  .logo-icon {
    width: 22px;
    height: 22px;
    background: var(--green-dim);
    border: 1px solid var(--green);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--green);
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 20px;
    color: var(--text-dim);
    font-size: 11px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 500;
    transition: color 0.3s;
  }

  .live-badge.connected { color: var(--green); }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: background 0.3s;
  }

  .live-badge.connected .live-dot {
    background: var(--green);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(45, 200, 138, 0.4); }
    50%       { opacity: 0.7; box-shadow: 0 0 0 4px rgba(45, 200, 138, 0); }
  }

  /* ── MAIN ────────────────────────────────────────────── */
  main {
    display: grid;
    grid-template-columns: var(--token-w) 1fr var(--detail-w);
    overflow: hidden;
  }

  /* ── PANEL BASE ──────────────────────────────────────── */
  .panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }

  .panel:last-child { border-right: none; }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    height: 34px;
    min-height: 34px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    user-select: none;
  }

  .panel-header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── BUTTONS ─────────────────────────────────────────── */
  .btn-icon {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    border-radius: 3px;
    width: 20px;
    height: 20px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.1s, border-color 0.1s;
    flex-shrink: 0;
  }

  .btn-icon:hover {
    color: var(--text);
    border-color: var(--text-dim);
  }

  .btn-sm {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    border-radius: 3px;
    padding: 1px 7px;
    height: 20px;
    cursor: pointer;
    font-family: inherit;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.1s, border-color 0.1s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .btn-sm:hover {
    color: var(--text);
    border-color: var(--text-dim);
  }

  .btn-sm.danger:hover {
    color: var(--red);
    border-color: var(--red);
  }

  /* ── TOKEN LIST ──────────────────────────────────────── */
  .token-item {
    display: flex;
    align-items: flex-start;
    padding: 10px 10px 10px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    gap: 6px;
  }

  .token-item:hover { background: var(--surface2); }

  .token-item.active {
    background: var(--sel);
    border-left: 2px solid var(--sel-border);
    padding-left: 10px;
  }

  .token-item-main {
    flex: 1;
    min-width: 0;
  }

  .token-id {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.03em;
  }

  .token-item.active .token-id { color: var(--cyan); }

  .token-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 3px;
    font-size: 10px;
    color: var(--text-dim);
    flex-wrap: wrap;
  }

  .token-del-btn {
    display: none;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 2px;
    flex-shrink: 0;
    margin-top: 2px;
    font-family: inherit;
  }

  .token-item:hover .token-del-btn {
    display: flex;
  }

  .token-del-btn:hover {
    color: var(--red);
    background: var(--red-dim);
  }

  .tag {
    padding: 1px 5px;
    border-radius: 2px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .tag-agent { background: var(--blue-dim); color: var(--blue); }
  .tag-script { background: var(--purple); color: #fff; opacity: 0.8; }
  .tag-anon { background: var(--surface3); color: var(--text-dim); }

  .req-count {
    font-size: 10px;
    color: var(--text-dim);
    margin-left: auto;
    white-space: nowrap;
  }

  .ttl-label {
    font-size: 9px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .ttl-label.expiring-soon {
    color: var(--amber);
  }

  /* ── URL BAR ─────────────────────────────────────────── */
  .url-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 12px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    min-height: 30px;
  }

  .url-bar-text {
    flex: 1;
    color: var(--green);
    font-size: 10px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    cursor: default;
  }

  /* ── REQUEST FEED ────────────────────────────────────── */
  .req-row {
    display: grid;
    grid-template-columns: 54px 46px 1fr;
    align-items: center;
    gap: 0;
    padding: 7px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }

  .req-row:hover { background: var(--surface2); }

  .req-row.active {
    background: var(--sel);
    border-left: 2px solid var(--sel-border);
    padding-left: 10px;
  }

  .req-row.new-flash {
    animation: flash 0.6s ease;
  }

  @keyframes flash {
    0%  { background: rgba(45, 200, 138, 0.12); }
    100%{ background: transparent; }
  }

  .req-time {
    font-size: 10px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  .method-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 1px 4px;
    border-radius: 2px;
    text-align: center;
  }

  .method-GET    { color: var(--blue);   background: var(--blue-dim); }
  .method-POST   { color: var(--green);  background: var(--green-dim); }
  .method-PUT    { color: var(--amber);  background: var(--amber-dim); }
  .method-PATCH  { color: var(--amber);  background: var(--amber-dim); }
  .method-DELETE { color: var(--red);    background: var(--red-dim); }

  .req-path {
    padding: 0 8px;
    font-size: 11px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── DETAIL PANEL ────────────────────────────────────── */
  .detail-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 11px;
    gap: 8px;
    user-select: none;
    padding: 40px 20px;
    text-align: center;
  }

  .detail-empty-icon {
    font-size: 28px;
    opacity: 0.3;
  }

  .detail-section {
    border-bottom: 1px solid var(--border);
  }

  .detail-section-head {
    padding: 6px 14px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: var(--surface);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
  }

  .detail-section-head:hover { color: var(--text); }

  .detail-section-body {
    padding: 10px 14px;
  }

  .detail-hero {
    padding: 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .detail-method-path {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .detail-method {
    font-size: 13px;
    font-weight: 600;
  }

  .detail-path {
    font-size: 13px;
    color: var(--text);
    word-break: break-all;
  }

  .detail-meta-row {
    display: flex;
    gap: 16px;
    margin-top: 6px;
    font-size: 10px;
    color: var(--text-dim);
  }

  /* key-value table */
  .kv-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
  }

  .kv-table tr { border-bottom: 1px solid var(--border); }
  .kv-table tr:last-child { border-bottom: none; }

  .kv-table td {
    padding: 4px 0;
    vertical-align: top;
  }

  .kv-key {
    color: var(--text-dim);
    padding-right: 12px;
    white-space: nowrap;
    font-size: 10px;
    min-width: 120px;
    max-width: 140px;
    word-break: break-all;
  }

  .kv-val {
    color: var(--text);
    word-break: break-all;
    font-size: 10px;
  }

  .code-block {
    background: var(--surface3);
    border: 1px solid var(--border2);
    border-radius: 3px;
    padding: 10px;
    font-size: 10.5px;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-all;
    overflow: auto;
    max-height: 220px;
    line-height: 1.7;
  }

  .code-block::-webkit-scrollbar { width: 4px; height: 4px; }
  .code-block::-webkit-scrollbar-track { background: transparent; }
  .code-block::-webkit-scrollbar-thumb { background: var(--border2); }

  /* syntax colors */
  .jk { color: var(--cyan); }
  .jv-str { color: var(--green); }
  .jv-num { color: var(--amber); }
  .jv-bool { color: var(--purple); }
  .jv-null { color: var(--text-dim); }

  /* ── FOOTER ──────────────────────────────────────────── */
  footer {
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 6px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    overflow-x: auto;
    overflow-y: hidden;
    user-select: none;
    font-size: 10px;
  }

  footer::-webkit-scrollbar { display: none; }

  .footer-label {
    color: var(--text-dim);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    white-space: nowrap;
    padding-right: 4px;
    border-right: 1px solid var(--border2);
    margin-right: 4px;
  }

  .var-chip {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--surface3);
    border: 1px solid var(--border2);
    border-radius: 3px;
    padding: 2px 0;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .var-key {
    padding: 0 6px;
    color: var(--text-dim);
    border-right: 1px solid var(--border2);
    font-size: 10px;
  }

  .var-val {
    padding: 0 7px;
    color: var(--green);
    font-size: 10px;
  }

  .empty-vars {
    color: var(--text-muted);
    font-size: 10px;
  }

  /* ── MISC ────────────────────────────────────────────── */
  .badge-live {
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--green);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .badge-live-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease infinite;
  }

  .token-count-chip {
    font-size: 10px;
    color: var(--text-dim);
  }

  .divider {
    width: 1px;
    height: 16px;
    background: var(--border2);
  }

  .detail-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOAST ───────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 56px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--surface3);
    border: 1px solid var(--border2);
    color: var(--green);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 6px 14px;
    border-radius: 3px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">⬡</div>
      AI HTTP BIN
    </div>
    <div class="header-meta">
      <span id="token-summary">loading…</span>
      <div class="divider"></div>
      <div class="live-badge" id="conn-badge">
        <div class="live-dot"></div>
        <span id="conn-label">CONNECTING</span>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- TOKENS -->
    <div class="panel" id="token-panel">
      <div class="panel-header">
        <span>Tokens <span class="token-count-chip" id="token-count">0</span></span>
        <div class="panel-header-right">
          <button class="btn-icon" id="create-token-btn" title="New token">+</button>
        </div>
      </div>
      <div class="panel-body" id="token-list">
        <div class="detail-empty">
          <div class="detail-empty-icon">◈</div>
          <span>loading…</span>
        </div>
      </div>
    </div>

    <!-- REQUEST FEED -->
    <div class="panel" id="feed-panel">
      <div class="panel-header">
        <span id="feed-title">Select a token</span>
        <div class="panel-header-right">
          <div class="badge-live" id="live-indicator" style="display:none">
            <div class="badge-live-dot"></div>
            LIVE
          </div>
        </div>
      </div>
      <div class="url-bar" id="url-bar" style="display:none">
        <span class="url-bar-text" id="url-bar-text"></span>
        <button class="btn-icon" id="copy-url-btn" title="Copy URL">⎘</button>
        <button class="btn-sm danger" id="clear-req-btn">clear</button>
      </div>
      <div class="panel-body" id="request-feed">
        <div class="detail-empty">
          <div class="detail-empty-icon">◈</div>
          <span>select a token to view requests</span>
        </div>
      </div>
    </div>

    <!-- DETAIL -->
    <div class="panel detail-panel" id="detail-panel">
      <div class="panel-header">
        Request Detail
      </div>
      <div class="panel-body" id="detail-body">
        <div class="detail-empty">
          <div class="detail-empty-icon">◉</div>
          <span>select a request to inspect</span>
        </div>
      </div>
    </div>

  </main>

  <!-- FOOTER: global vars -->
  <footer>
    <span class="footer-label">Global Vars</span>
    <div id="vars-strip">
      <span class="empty-vars">no global vars</span>
    </div>
  </footer>

</div>

<div id="toast" class="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────
var BASE    = window.location.origin;
var WS_URL  = BASE.replace(/^http/, 'ws') + '/graphql';

// ── STATE ─────────────────────────────────────────────────────────
var tokens          = [];
var requestsMap     = {}; // tokenId -> [Request]
var globalVars      = [];
var selectedToken   = null;
var selectedRequest = null;

// ── WEBSOCKET ─────────────────────────────────────────────────────
var ws        = null;
var wsReady   = false;
var wsSubId   = null;
var wsRetryMs = 2000;

// ── HELPERS ───────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function shortId(id) {
  return id ? id.substring(0, 8) : '????????';
}

function formatTime(iso) {
  try {
    var d = new Date(iso);
    return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch(e) {
    return (iso || '').slice(11, 19) || '--:--:--';
  }
}

function methodClass(m) { return 'method-' + (m || 'GET'); }

function methodColor(m) {
  var map = { GET: 'var(--blue)', POST: 'var(--green)', PUT: 'var(--amber)', PATCH: 'var(--amber)', DELETE: 'var(--red)' };
  return map[m] || 'var(--text)';
}

function prettyJson(str) {
  if (!str || str === 'null') return null;
  try {
    var obj = JSON.parse(str);
    return syntaxHighlight(JSON.stringify(obj, null, 2));
  } catch(e) {
    return esc(str);
  }
}

function syntaxHighlight(json) {
  return json
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function(match) {
      var cls = 'jv-num';
      if (/^"/.test(match)) {
        cls = /:$/.test(match) ? 'jk' : 'jv-str';
      } else if (/true|false/.test(match)) {
        cls = 'jv-bool';
      } else if (/null/.test(match)) {
        cls = 'jv-null';
      }
      if (cls === 'jk') return '<span class="jk">' + esc(match) + '</span>';
      return '<span class="' + cls + '">' + esc(match) + '</span>';
    })
    .replace(/\n/g, '<br>')
    .replace(/ {2}/g, '&nbsp;&nbsp;');
}

// Normalize a request from either REST (snake_case) or GraphQL (camelCase)
function normalizeReq(r) {
  return {
    id:         r.id,
    token_id:   r.token_id  || r.tokenId  || '',
    method:     r.method    || 'GET',
    url:        r.url       || '',
    hostname:   r.hostname  || '',
    path:       r.path      || '/',
    headers:    r.headers   || '{}',
    query:      r.query     || '{}',
    body:       r.body      || '',
    form_data:  r.form_data || r.formData || 'null',
    ip:         r.ip        || '',
    user_agent: r.user_agent || r.userAgent || '',
    created_at: r.created_at || r.createdAt || ''
  };
}

// Returns {label, soon} for a token's expires_at field.
// soon = true when less than 2 hours remain.
function ttlLabel(expiresAt) {
  if (!expiresAt) return null;
  var ms = new Date(expiresAt) - Date.now();
  if (ms <= 0) return { label: 'expired', soon: true };
  var h = Math.floor(ms / 3600000);
  var m = Math.floor((ms % 3600000) / 60000);
  var label = h > 0 ? (h + 'h ' + m + 'm') : (m + 'm');
  return { label: label, soon: h < 2 };
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 1800);
}

// ── API ───────────────────────────────────────────────────────────
function apiFetch(method, path, body) {
  var opts = { method: method, headers: {} };
  if (body !== undefined && body !== null) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  return fetch(BASE + path, opts).then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    if (res.status === 204) return null;
    return res.json();
  });
}

// ── TOKEN API ─────────────────────────────────────────────────────
function loadTokens() {
  return apiFetch('GET', '/api/tokens').then(function(data) {
    tokens = data || [];
    updateTokenSummary();
    renderTokenList();
  }).catch(function(err) {
    console.error('loadTokens:', err);
  });
}

function createToken() {
  apiFetch('POST', '/api/tokens', {}).then(function(t) {
    tokens.unshift(t);
    updateTokenSummary();
    renderTokenList();
    selectToken(t);
  }).catch(function(err) {
    console.error('createToken:', err);
    showToast('failed to create token');
  });
}

function deleteToken(tokenId) {
  apiFetch('DELETE', '/api/tokens/' + tokenId).then(function() {
    tokens = tokens.filter(function(t) { return t.id !== tokenId; });
    if (selectedToken && selectedToken.id === tokenId) {
      selectedToken   = null;
      selectedRequest = null;
      wsUnsubscribe();
      renderFeedEmpty();
      renderDetailEmpty();
      document.getElementById('url-bar').style.display = 'none';
      document.getElementById('feed-title').textContent = 'Select a token';
      document.getElementById('live-indicator').style.display = 'none';
    }
    updateTokenSummary();
    renderTokenList();
  }).catch(function(err) {
    console.error('deleteToken:', err);
    showToast('failed to delete token');
  });
}

// ── REQUEST API ───────────────────────────────────────────────────
function loadRequests(token) {
  return apiFetch('GET', '/api/tokens/' + token.id + '/requests?per_page=200&sorting=newest').then(function(data) {
    var reqs = (data.data || []).map(normalizeReq);
    requestsMap[token.id] = reqs;
    // Sync request count on the token object
    var t = findToken(token.id);
    if (t) t.request_count = data.total || reqs.length;
    renderFeed(token);
    renderTokenList();
  }).catch(function(err) {
    console.error('loadRequests:', err);
  });
}

function clearRequests(token) {
  apiFetch('DELETE', '/api/tokens/' + token.id + '/requests').then(function() {
    requestsMap[token.id] = [];
    var t = findToken(token.id);
    if (t) t.request_count = 0;
    renderFeed(token);
    renderTokenList();
    if (selectedRequest && selectedRequest.token_id === token.id) {
      selectedRequest = null;
      renderDetailEmpty();
    }
  }).catch(function(err) {
    console.error('clearRequests:', err);
    showToast('failed to clear requests');
  });
}

// ── GLOBAL VARS API ───────────────────────────────────────────────
function loadGlobalVars() {
  apiFetch('GET', '/api/vars').then(function(data) {
    globalVars = data || [];
    renderVars();
  }).catch(function(err) {
    console.error('loadGlobalVars:', err);
  });
}

// ── HELPERS ───────────────────────────────────────────────────────
function findToken(id) {
  for (var i = 0; i < tokens.length; i++) {
    if (tokens[i].id === id) return tokens[i];
  }
  return null;
}

function updateTokenSummary() {
  var total = 0;
  for (var i = 0; i < tokens.length; i++) {
    total += tokens[i].request_count || 0;
  }
  document.getElementById('token-summary').textContent =
    tokens.length + ' token' + (tokens.length !== 1 ? 's' : '') +
    ' · ' + total + ' request' + (total !== 1 ? 's' : '');
  document.getElementById('token-count').textContent = tokens.length;
}

// ── RENDER: TOKEN LIST ─────────────────────────────────────────────
function renderTokenList() {
  var list = document.getElementById('token-list');
  list.innerHTML = '';

  if (tokens.length === 0) {
    list.innerHTML =
      '<div class="detail-empty">' +
      '<div class="detail-empty-icon">◈</div>' +
      '<span>no tokens — click + to create one</span>' +
      '</div>';
    return;
  }

  tokens.forEach(function(t) {
    var div = document.createElement('div');
    div.className = 'token-item' + (selectedToken && selectedToken.id === t.id ? ' active' : '');
    div.setAttribute('data-id', t.id);

    var tagHtml = '';
    if (t.agent_id) {
      tagHtml += '<span class="tag tag-agent">' + esc(t.agent_id) + '</span>';
    } else {
      tagHtml += '<span class="tag tag-anon">anon</span>';
    }
    if (t.script) {
      tagHtml += ' <span class="tag tag-script">script</span>';
    }

    var count = t.request_count || 0;
    var ttl = ttlLabel(t.expires_at);
    var ttlHtml = ttl
      ? ' <span class="ttl-label' + (ttl.soon ? ' expiring-soon' : '') + '">' + esc(ttl.label) + '</span>'
      : '';

    div.innerHTML =
      '<div class="token-item-main">' +
        '<div class="token-id">' + esc(shortId(t.id)) + '</div>' +
        '<div class="token-meta">' +
          tagHtml +
          '<span class="req-count">' + count + ' req' + (count !== 1 ? 's' : '') + '</span>' +
          ttlHtml +
        '</div>' +
      '</div>' +
      '<button class="token-del-btn" data-id="' + esc(t.id) + '" title="Delete token">×</button>';

    div.addEventListener('click', function(e) {
      if (e.target.classList.contains('token-del-btn')) return;
      selectToken(t);
    });

    var delBtn = div.querySelector('.token-del-btn');
    delBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      deleteToken(t.id);
    });

    list.appendChild(div);
  });
}

// ── RENDER: REQUEST FEED ───────────────────────────────────────────
function renderFeed(token) {
  var feed   = document.getElementById('request-feed');
  var title  = document.getElementById('feed-title');
  var live   = document.getElementById('live-indicator');
  var urlBar = document.getElementById('url-bar');
  var urlTxt = document.getElementById('url-bar-text');

  title.textContent = shortId(token.id);
  live.style.display = 'flex';
  urlBar.style.display = 'flex';
  urlTxt.textContent = token.url || (BASE + '/' + token.id);

  var reqs = requestsMap[token.id] || [];
  feed.innerHTML = '';

  if (reqs.length === 0) {
    feed.innerHTML =
      '<div class="detail-empty">' +
      '<div class="detail-empty-icon">◈</div>' +
      '<span>no requests yet</span>' +
      '</div>';
    return;
  }

  reqs.forEach(function(r) {
    feed.appendChild(buildReqRow(r));
  });
}

function renderFeedEmpty() {
  var feed = document.getElementById('request-feed');
  feed.innerHTML =
    '<div class="detail-empty">' +
    '<div class="detail-empty-icon">◈</div>' +
    '<span>select a token to view requests</span>' +
    '</div>';
}

function buildReqRow(r) {
  var div = document.createElement('div');
  div.className = 'req-row' + (selectedRequest && selectedRequest.id === r.id ? ' active' : '');
  div.setAttribute('data-id', r.id);

  var displayPath = r.path || '/';

  div.innerHTML =
    '<span class="req-time">' + esc(formatTime(r.created_at)) + '</span>' +
    '<span class="method-badge ' + methodClass(r.method) + '">' + esc(r.method) + '</span>' +
    '<span class="req-path">' + esc(displayPath) + '</span>';

  div.addEventListener('click', function() {
    selectRequest(r);
  });
  return div;
}

// ── RENDER: DETAIL ────────────────────────────────────────────────
function renderDetail(r) {
  var body = document.getElementById('detail-body');
  body.innerHTML = '';

  // Hero
  var hero = document.createElement('div');
  hero.className = 'detail-hero';
  hero.innerHTML =
    '<div class="detail-method-path">' +
      '<span class="detail-method" style="color:' + methodColor(r.method) + '">' + esc(r.method) + '</span>' +
      '<span class="detail-path">' + esc(r.path || '/') + '</span>' +
    '</div>' +
    '<div class="detail-meta-row">' +
      '<span>' + esc(formatTime(r.created_at)) + '</span>' +
      (r.ip ? '<span>' + esc(r.ip) + '</span>' : '') +
      (r.user_agent ? '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px">' + esc(r.user_agent) + '</span>' : '') +
    '</div>';
  body.appendChild(hero);

  // Headers
  var hdrs = parseJsonObj(r.headers);
  if (hdrs && Object.keys(hdrs).length > 0) {
    body.appendChild(buildSection('Headers', buildKV(hdrs)));
  }

  // Query params
  var qry = parseJsonObj(r.query);
  if (qry && Object.keys(qry).length > 0) {
    body.appendChild(buildSection('Query', buildKV(qry)));
  }

  // Body
  var bodyHtml;
  if (r.body && r.body.trim()) {
    var pretty = prettyJson(r.body);
    bodyHtml = buildCodeBlock(pretty !== null ? pretty : esc(r.body));
  } else {
    bodyHtml = '<span style="color:var(--text-muted);font-size:10px;font-style:italic">empty</span>';
  }
  body.appendChild(buildSection('Body', bodyHtml));

  // Form data
  var formData = parseJsonObj(r.form_data);
  if (formData && Object.keys(formData).length > 0) {
    body.appendChild(buildSection('Form Data', buildKV(formData)));
  }
}

function renderDetailEmpty() {
  document.getElementById('detail-body').innerHTML =
    '<div class="detail-empty">' +
    '<div class="detail-empty-icon">◉</div>' +
    '<span>select a request to inspect</span>' +
    '</div>';
}

function renderTokenConfig(token) {
  var body = document.getElementById('detail-body');
  body.innerHTML = '';

  // Hero
  var hero = document.createElement('div');
  hero.className = 'detail-hero';
  hero.innerHTML =
    '<div class="detail-method-path">' +
      '<span class="detail-method" style="color:var(--text-dim)">TOKEN</span>' +
      '<span class="detail-path">' + esc(shortId(token.id)) + '</span>' +
    '</div>' +
    '<div class="detail-meta-row">' +
      '<span>status <span style="color:var(--green)">' + (token.default_status || 200) + '</span></span>' +
      '<span style="color:var(--text-dim)">' + esc(token.default_content_type || 'text/plain') + '</span>' +
    '</div>';
  body.appendChild(hero);

  // Response body
  var content = token.default_content || '';
  var contentHtml = content
    ? buildCodeBlock(prettyJson(content) || esc(content))
    : '<span style="color:var(--text-muted);font-size:10px;font-style:italic">empty</span>';
  body.appendChild(buildSection('Response Body', contentHtml));

  // Script
  if (token.script) {
    body.appendChild(buildSection('Script', buildCodeBlock(esc(token.script))));
  }
}

function parseJsonObj(str) {
  if (!str || str === 'null' || str === '{}') return null;
  try { return JSON.parse(str); } catch(e) { return null; }
}

function buildSection(title, contentHtml) {
  var sec  = document.createElement('div');
  sec.className = 'detail-section';

  var head = document.createElement('div');
  head.className = 'detail-section-head';
  head.innerHTML = esc(title) + '<span style="font-size:9px;color:var(--text-muted)">▾</span>';

  var bdy  = document.createElement('div');
  bdy.className = 'detail-section-body';
  bdy.innerHTML = contentHtml;

  head.addEventListener('click', function() {
    bdy.style.display = bdy.style.display === 'none' ? '' : 'none';
  });

  sec.appendChild(head);
  sec.appendChild(bdy);
  return sec;
}

function buildKV(obj) {
  var rows = '';
  Object.keys(obj).forEach(function(k) {
    rows += '<tr><td class="kv-key">' + esc(k) + '</td><td class="kv-val">' + esc(obj[k]) + '</td></tr>';
  });
  return '<table class="kv-table"><tbody>' + rows + '</tbody></table>';
}

function buildCodeBlock(html) {
  return '<div class="code-block">' + html + '</div>';
}

// ── RENDER: GLOBAL VARS ────────────────────────────────────────────
function renderVars() {
  var strip = document.getElementById('vars-strip');
  strip.innerHTML = '';
  if (!globalVars || globalVars.length === 0) {
    strip.innerHTML = '<span class="empty-vars">no global vars</span>';
    return;
  }
  globalVars.forEach(function(v) {
    var chip = document.createElement('div');
    chip.className = 'var-chip';
    var val = v.value || '';
    chip.innerHTML =
      '<span class="var-key">' + esc(v.key) + '</span>' +
      '<span class="var-val">' + esc(val.length > 24 ? val.substring(0, 24) + '…' : val) + '</span>';
    strip.appendChild(chip);
  });
}

// ── ACTIONS ───────────────────────────────────────────────────────
function selectToken(token) {
  selectedToken   = token;
  selectedRequest = null;
  renderTokenList();
  renderTokenConfig(token);

  // Show URL bar
  document.getElementById('url-bar').style.display = 'flex';
  document.getElementById('url-bar-text').textContent = token.url || (BASE + '/' + token.id);

  // Show feed header
  document.getElementById('feed-title').textContent = shortId(token.id);
  document.getElementById('live-indicator').style.display = 'flex';

  // Load requests (render inside)
  if (requestsMap[token.id]) {
    renderFeed(token);
  } else {
    document.getElementById('request-feed').innerHTML =
      '<div class="detail-empty"><div class="detail-empty-icon">◈</div><span>loading…</span></div>';
    loadRequests(token);
  }

  // Subscribe to this token
  wsSubscribe(token.id);
}

function selectRequest(req) {
  selectedRequest = req;
  // Update active row
  var rows = document.querySelectorAll('.req-row');
  rows.forEach(function(row) {
    if (row.getAttribute('data-id') === req.id) {
      row.classList.add('active');
    } else {
      row.classList.remove('active');
    }
  });
  renderDetail(req);
}

// ── WEBSOCKET ─────────────────────────────────────────────────────
function wsConnect() {
  if (ws) return;
  try {
    ws = new WebSocket(WS_URL, 'graphql-transport-ws');
  } catch(e) {
    console.error('WS connect error:', e);
    scheduleReconnect();
    return;
  }

  ws.addEventListener('open', function() {
    ws.send(JSON.stringify({ type: 'connection_init', payload: {} }));
  });

  ws.addEventListener('message', function(event) {
    var msg;
    try { msg = JSON.parse(event.data); } catch(e) { return; }
    wsHandleMessage(msg);
  });

  ws.addEventListener('close', function() {
    ws      = null;
    wsReady = false;
    wsSubId = null;
    setConnected(false);
    scheduleReconnect();
  });

  ws.addEventListener('error', function() {
    // close event will follow
  });
}

function wsHandleMessage(msg) {
  switch(msg.type) {
    case 'connection_ack':
      wsReady = true;
      setConnected(true);
      if (selectedToken) wsSubscribe(selectedToken.id);
      break;
    case 'ping':
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'pong' }));
      }
      break;
    case 'next':
      if (msg.payload && msg.payload.data && msg.payload.data.requestReceived) {
        wsHandleRequestReceived(msg.payload.data.requestReceived);
      }
      break;
    case 'error':
      console.error('WS subscription error:', msg.payload);
      break;
    case 'complete':
      break;
  }
}

function wsSubscribe(tokenId) {
  wsUnsubscribe();
  if (!ws || !wsReady || ws.readyState !== WebSocket.OPEN) return;

  wsSubId = 'sub-' + tokenId;
  ws.send(JSON.stringify({
    type: 'subscribe',
    id: wsSubId,
    payload: {
      query: 'subscription { requestReceived(tokenId: "' + tokenId + '") { request { id tokenId method url hostname path headers query body formData ip userAgent createdAt } total truncated } }'
    }
  }));
}

function wsUnsubscribe() {
  if (ws && wsSubId && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'complete', id: wsSubId }));
  }
  wsSubId = null;
}

function wsHandleRequestReceived(event) {
  var raw    = event.request;
  var req    = normalizeReq(raw);
  var tokenId = req.token_id;

  if (!requestsMap[tokenId]) requestsMap[tokenId] = [];
  requestsMap[tokenId].unshift(req);

  // Update token request count
  var t = findToken(tokenId);
  if (t) t.request_count = event.total;

  updateTokenSummary();
  renderTokenList();

  // Update feed if this is the selected token
  if (selectedToken && selectedToken.id === tokenId) {
    var feed  = document.getElementById('request-feed');
    var empty = feed.querySelector('.detail-empty');
    if (empty) feed.innerHTML = '';

    var row = buildReqRow(req);
    row.classList.add('new-flash');
    feed.insertBefore(row, feed.firstChild);
  }
}

function setConnected(v) {
  var badge = document.getElementById('conn-badge');
  var label = document.getElementById('conn-label');
  if (v) {
    badge.classList.add('connected');
    label.textContent = 'CONNECTED';
  } else {
    badge.classList.remove('connected');
    label.textContent = 'DISCONNECTED';
  }
}

var reconnectTimer = null;
function scheduleReconnect() {
  if (reconnectTimer) return;
  reconnectTimer = setTimeout(function() {
    reconnectTimer = null;
    wsConnect();
  }, wsRetryMs);
}

// ── CLIPBOARD ─────────────────────────────────────────────────────
function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      showToast('URL copied');
    }).catch(function() {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showToast('URL copied');
}

// ── BUTTON WIRING ─────────────────────────────────────────────────
document.getElementById('create-token-btn').addEventListener('click', function() {
  createToken();
});

document.getElementById('copy-url-btn').addEventListener('click', function() {
  var url = document.getElementById('url-bar-text').textContent;
  if (url) copyToClipboard(url);
});

document.getElementById('clear-req-btn').addEventListener('click', function() {
  if (selectedToken) clearRequests(selectedToken);
});

// ── INIT ──────────────────────────────────────────────────────────
function init() {
  wsConnect();
  loadTokens().then(function() {
    if (tokens.length > 0) selectToken(tokens[0]);
  });
  loadGlobalVars();
  setInterval(loadGlobalVars, 5000);
}

init();
</script>
